version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cvanalyzer
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: cvanalyzer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    # Load all user-configured values (API keys, LLM_MODEL, OAuth creds) from backend/.env
    # so they are never clobbered by empty host-shell substitutions below.
    env_file:
      - ./backend/.env
    environment:
      # Infrastructure — always set here, not from .env
      DATABASE_URL: postgresql+asyncpg://cvanalyzer:devpassword@db:5432/cvanalyzer
      REDIS_URL: redis://redis:6379
      # OAuth callback URLs — override .env defaults for Docker networking
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - ./prompts:/app/prompts
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://cvanalyzer:devpassword@db:5432/cvanalyzer
      REDIS_URL: redis://redis:6379
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - ./prompts:/app/prompts
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  postgres_data:
