# Railway deployment configuration for the FastAPI backend service
# Docs: https://docs.railway.com/reference/config-as-code
#
# Setup: Create TWO services in Railway, both pointing to this repo:
#   1. "backend"  — uses this file (uvicorn start command below)
#   2. "celery"   — same source/Dockerfile, override start command in Railway UI:
#                   celery -A app.workers.celery_app worker --loglevel=info --concurrency=2

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "./start.sh"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
